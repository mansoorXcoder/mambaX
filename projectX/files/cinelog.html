<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="app.js" />

  <title>🎬 Movie Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --font-display: 'Bebas Neue', sans-serif;
  --font-body:    'DM Sans', sans-serif;
  --bg-root:      #0d0f1a;
  --bg-surface:   rgba(255,255,255,0.05);
  --bg-surface2:  rgba(255,255,255,0.09);
  --border:       rgba(255,255,255,0.12);
  --text-primary: #f0f0f5;
  --text-muted:   #888aaa;
  --accent:       #e94560;
  --accent-soft:  rgba(233,69,96,0.18);
  --accent2:      #f5a623;
  --success:      #27c97a;
  --danger:       #e94560;
  --tag-bg:       rgba(255,255,255,0.1);
  --shadow:       0 8px 32px rgba(0,0,0,0.5);
  --blur:         blur(16px);
  --card-hover:   rgba(255,255,255,0.08);
}
[data-theme="light"] {
  --bg-root:      #f0f2f8;
  --bg-surface:   rgba(255,255,255,0.65);
  --bg-surface2:  rgba(255,255,255,0.85);
  --border:       rgba(0,0,0,0.1);
  --text-primary: #1a1c2e;
  --text-muted:   #666880;
  --accent2:      #e07b00;
  --tag-bg:       rgba(0,0,0,0.07);
  --shadow:       0 8px 32px rgba(0,0,0,0.12);
  --card-hover:   rgba(0,0,0,0.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg-root);color:var(--text-primary);min-height:100vh;transition:background .4s,color .4s;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(233,69,96,.12) 0%,transparent 60%),radial-gradient(ellipse 60% 70% at 80% 80%,rgba(90,100,255,.10) 0%,transparent 60%);pointer-events:none;z-index:0}
.app-wrapper{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:1rem 1.25rem 4rem;display:flex;flex-direction:column;gap:1.25rem}
.site-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.5rem;background:var(--bg-surface);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
.logo{font-family:var(--font-display);font-size:2rem;letter-spacing:2px;color:var(--accent);text-shadow:0 0 24px rgba(233,69,96,.5)}
.glass-card{background:var(--bg-surface);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;box-shadow:var(--shadow)}
.section-title{font-family:var(--font-display);font-size:1.2rem;letter-spacing:1.5px;color:var(--accent);margin-bottom:.75rem}
.user-row{display:flex;flex-wrap:wrap;gap:.6rem;align-items:center}
.inline-form{display:flex;gap:.6rem;margin-top:.75rem;flex-wrap:wrap;align-items:center}
.stats-bar{display:flex;gap:.75rem;flex-wrap:wrap}
.stat-pill{flex:1 1 80px;background:var(--bg-surface);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;text-align:center;box-shadow:var(--shadow);transition:transform .2s}
.stat-pill:hover{transform:translateY(-2px)}
.stat-pill span{display:block;font-family:var(--font-display);font-size:1.8rem;color:var(--accent)}
.stat-pill label{font-size:.7rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase}
.filter-bar{display:flex;gap:.75rem;flex-wrap:wrap;align-items:center}
.search-field{flex:1 1 180px}
.input-field{background:var(--bg-surface2);border:1px solid var(--border);border-radius:8px;padding:.55rem .9rem;color:var(--text-primary);font-family:var(--font-body);font-size:.875rem;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.input-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
select.input-field{cursor:pointer}
textarea.input-field{resize:vertical}
.range-input{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--tag-bg);border:none;outline:none;cursor:pointer}
.range-input::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);cursor:pointer}
.rating-display{font-family:var(--font-display);font-size:1.2rem;color:var(--accent2);margin-left:4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:8px;border:1px solid var(--border);font-family:var(--font-body);font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;background:transparent;color:var(--text-primary)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-accent:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-ghost{background:var(--bg-surface2)}
.btn-ghost:hover{background:var(--card-hover)}
.btn-danger{border-color:var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--accent-soft)}
.icon-btn{background:var(--bg-surface2);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;cursor:pointer;color:var(--text-primary);font-size:1rem;transition:all .2s}
.icon-btn:hover{background:var(--card-hover);transform:scale(1.05)}
.movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem}
.movie-card{background:var(--bg-surface);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s,border-color .25s;display:flex;flex-direction:column;animation:fadeUp .35s ease both}
.movie-card:hover{transform:translateY(-5px);box-shadow:0 16px 48px rgba(0,0,0,.45);border-color:var(--accent)}
.movie-card.is-fav{border-color:rgba(233,69,96,.5)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;object-position:top;display:block;max-height:300px}
.card-poster-placeholder{width:100%;aspect-ratio:2/3;max-height:300px;background:linear-gradient(135deg,var(--bg-surface2) 0%,var(--bg-surface) 100%);display:flex;align-items:center;justify-content:center;font-size:4rem}
.card-body{padding:1rem;display:flex;flex-direction:column;gap:.5rem;flex:1}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}
.card-title{font-size:1rem;font-weight:600;line-height:1.3;flex:1}
.fav-btn{background:none;border:none;cursor:pointer;font-size:1.2rem;line-height:1;transition:transform .2s;padding:0;flex-shrink:0}
.fav-btn:hover{transform:scale(1.3)}
.card-tags{display:flex;flex-wrap:wrap;gap:.4rem}
.tag{font-size:.68rem;padding:.2rem .55rem;border-radius:20px;background:var(--tag-bg);color:var(--text-muted);border:1px solid var(--border);font-weight:500;letter-spacing:.4px}
.tag.status-watched{background:rgba(39,201,122,.18);color:var(--success);border-color:rgba(39,201,122,.3)}
.tag.status-watching{background:rgba(90,100,255,.18);color:#8b9bff;border-color:rgba(90,100,255,.3)}
.tag.status-plan{background:rgba(245,166,35,.18);color:var(--accent2);border-color:rgba(245,166,35,.3)}
.card-rating{display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:var(--text-muted)}
.rating-bar{flex:1;height:4px;border-radius:2px;background:var(--tag-bg);overflow:hidden}
.rating-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .5s ease}
.rating-value{font-family:var(--font-display);font-size:1rem;color:var(--accent2)}
.card-meta{display:flex;flex-direction:column;gap:.2rem;font-size:.75rem;color:var(--text-muted)}
.card-notes{font-size:.78rem;color:var(--text-muted);font-style:italic;border-left:2px solid var(--accent);padding-left:.5rem;line-height:1.4}
.card-actions{display:flex;gap:.5rem;padding:.75rem 1rem;border-top:1px solid var(--border);margin-top:auto}
.card-actions .btn{flex:1;font-size:.8rem;padding:.45rem .5rem}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text-muted);font-size:1rem;grid-column:1/-1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:640px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-header h2{font-family:var(--font-display);font-size:1.5rem;letter-spacing:1px;color:var(--accent)}
.movie-form .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:.4rem}
.form-group.span2{grid-column:span 2}
.form-group label{font-size:.8rem;font-weight:500;color:var(--text-muted);letter-spacing:.3px}
.req{color:var(--accent)}
.fav-row{flex-direction:row;align-items:center}
.toggle-label{display:inline-flex;align-items:center;gap:.75rem;cursor:pointer;font-size:.875rem;color:var(--text-primary);user-select:none}
.toggle-label input{display:none}
.toggle-track{width:42px;height:24px;border-radius:12px;background:var(--tag-bg);border:1px solid var(--border);position:relative;transition:background .2s}
.toggle-thumb{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--text-muted);transition:transform .2s,background .2s}
.toggle-label input:checked+.toggle-track{background:var(--accent-soft);border-color:var(--accent)}
.toggle-label input:checked+.toggle-track .toggle-thumb{transform:translateX(18px);background:var(--accent)}
.form-actions{display:flex;gap:.75rem;margin-top:1.25rem;justify-content:flex-end}
.hidden{display:none!important}
@media(max-width:640px){
  .movie-form .form-grid{grid-template-columns:1fr}
  .form-group.span2{grid-column:span 1}
  .stats-bar{gap:.5rem}
  .stat-pill span{font-size:1.4rem}
  .logo{font-size:1.6rem}
  .movie-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
</style>
</head>
<body>

<header class="site-header">
  <span class="logo">🎬 CineLog</span>
  <button id="themeToggle" class="icon-btn" title="Toggle theme">🌙</button>
</header>

<main class="app-wrapper">

  <!-- USER PANEL -->
  <section class="glass-card">
    <h2 class="section-title">👤 User</h2>
    <div class="user-row">
      <select id="userSelect" class="input-field" style="max-width:200px"></select>
      <button class="btn btn-ghost" id="addUserBtn">+ Add User</button>
      <button class="btn btn-danger" id="deleteUserBtn">🗑 Delete</button>
    </div>
    <div id="addUserForm" class="inline-form hidden">
      <input type="text" id="newUserName" class="input-field" placeholder="Enter name…" style="max-width:200px" />
      <button class="btn btn-accent" id="confirmAddUser">Add</button>
      <button class="btn btn-ghost" id="cancelAddUser">Cancel</button>
    </div>
  </section>

  <!-- STATS -->
  <section class="stats-bar">
    <div class="stat-pill"><span id="statTotal">0</span><label>Total</label></div>
    <div class="stat-pill"><span id="statWatched">0</span><label>Watched</label></div>
    <div class="stat-pill"><span id="statWatching">0</span><label>Watching</label></div>
    <div class="stat-pill"><span id="statPlan">0</span><label>Planned</label></div>
    <div class="stat-pill"><span id="statFav">0</span><label>Favourites</label></div>
  </section>

  <!-- FILTERS -->
  <section class="glass-card filter-bar">
    <input type="text" id="searchInput" class="input-field search-field" placeholder="🔍  Search title…" />
    <select id="filterType" class="input-field" style="max-width:140px">
      <option value="">All Types</option>
      <option value="Movie">Movie</option>
      <option value="Series">Series</option>
      <option value="Anime">Anime</option>
    </select>
    <select id="filterStatus" class="input-field" style="max-width:160px">
      <option value="">All Status</option>
      <option value="Watched">Watched</option>
      <option value="Watching">Watching</option>
      <option value="Plan to Watch">Plan to Watch</option>
    </select>
    <button class="btn btn-accent" id="openAddModal">＋ Add Movie</button>
  </section>

  <!-- GRID -->
  <section class="movie-grid" id="movieGrid"></section>
  <div id="emptyState" class="empty-state hidden"><p>🎞 No movies yet — add your first one!</p></div>

</main>

<!-- MODAL -->
<div class="modal-overlay hidden" id="movieModal">
  <div class="modal glass-card">
    <div class="modal-header">
      <h2 id="modalTitle">Add Movie</h2>
      <button class="icon-btn" id="closeModal">✕</button>
    </div>
    <form id="movieForm" class="movie-form" autocomplete="off">
      <input type="hidden" id="editId" />
      <div class="form-grid">
        <div class="form-group span2">
          <label>Title <span class="req">*</span></label>
          <input type="text" id="fTitle" class="input-field" placeholder="e.g. Inception" required />
        </div>
        <div class="form-group">
          <label>Type <span class="req">*</span></label>
          <select id="fType" class="input-field" required>
            <option value="">— Select —</option>
            <option value="Movie">Movie</option>
            <option value="Series">Series</option>
            <option value="Anime">Anime</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status <span class="req">*</span></label>
          <select id="fStatus" class="input-field" required>
            <option value="">— Select —</option>
            <option value="Watched">Watched</option>
            <option value="Watching">Watching</option>
            <option value="Plan to Watch">Plan to Watch</option>
          </select>
        </div>
        <div class="form-group">
          <label>Rating <span class="req">*</span> <span id="ratingDisplay" class="rating-display">5</span>/10</label>
          <input type="range" id="fRating" min="1" max="10" value="5" class="range-input" />
        </div>
        <div class="form-group">
          <label>Genre</label>
          <input type="text" id="fGenre" class="input-field" placeholder="e.g. Sci-Fi, Action" />
        </div>
        <div class="form-group">
          <label>Platform</label>
          <input type="text" id="fPlatform" class="input-field" placeholder="e.g. Netflix, Prime" />
        </div>
        <div class="form-group">
          <label>Episodes</label>
          <input type="number" id="fEpisodes" class="input-field" placeholder="0" min="0" />
        </div>
        <div class="form-group">
          <label>Rewatch Count</label>
          <input type="number" id="fRewatch" class="input-field" placeholder="0" min="0" />
        </div>
        <div class="form-group span2">
          <label>Poster URL</label>
          <input type="url" id="fPoster" class="input-field" placeholder="https://image.tmdb.org/…" />
        </div>
        <div class="form-group span2">
          <label>Notes</label>
          <textarea id="fNotes" class="input-field" rows="3" placeholder="Your thoughts…"></textarea>
        </div>
        <div class="form-group span2 fav-row">
          <label class="toggle-label">
            <input type="checkbox" id="fFav" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            Mark as Favourite ❤️
          </label>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-accent">Save Movie</button>
        <button type="button" class="btn btn-ghost" id="cancelModal">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* ════════════════════════════════════════════
   FIREBASE CONFIG — replace with your own
   Firebase Console → Project Settings → SDK
════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyA-_8OmY4BFxQPqEa9hWb1ItvACPDPup5c",
  authDomain:        "movie-tracker-web-app-4bdec.firebaseapp.com",
  projectId:         "movie-tracker-web-app-4bdec",
  storageBucket:     "movie-tracker-web-app-4bdec.firebasestorage.app",
  messagingSenderId: "901631045576",
  appId:             "1:901631045576:web:db51af7c12de3cd1af1afd",
  measurementId:     "G-GSK7N51TMX"
};

firebase.initializeApp(firebaseConfig);
const db        = firebase.firestore();
const usersCol  = db.collection("users");
const moviesCol = db.collection("movies");

/* ── State ── */
let currentUserId = null, currentUserName = null;
let allMovies = [], moviesListener = null;

/* ── DOM ── */
const $ = id => document.getElementById(id);
const userSelect     = $("userSelect");
const addUserBtn     = $("addUserBtn");
const deleteUserBtn  = $("deleteUserBtn");
const addUserForm    = $("addUserForm");
const newUserNameEl  = $("newUserName");
const confirmAddUser = $("confirmAddUser");
const cancelAddUser  = $("cancelAddUser");
const searchInput    = $("searchInput");
const filterType     = $("filterType");
const filterStatus   = $("filterStatus");
const openAddModal   = $("openAddModal");
const movieGrid      = $("movieGrid");
const emptyState     = $("emptyState");
const movieModal     = $("movieModal");
const modalTitle     = $("modalTitle");
const movieForm      = $("movieForm");
const editId         = $("editId");
const fTitle=$("fTitle"),fType=$("fType"),fStatus=$("fStatus"),fRating=$("fRating");
const fGenre=$("fGenre"),fPlatform=$("fPlatform"),fEpisodes=$("fEpisodes"),fRewatch=$("fRewatch");
const fPoster=$("fPoster"),fNotes=$("fNotes"),fFav=$("fFav");
const ratingDisplay=$("ratingDisplay"), themeToggle=$("themeToggle");
const statTotal=$("statTotal"),statWatched=$("statWatched"),statWatching=$("statWatching"),statPlan=$("statPlan"),statFav=$("statFav");

/* ════ THEME ════ */
function initTheme(){
  const t=localStorage.getItem("cinelog-theme")||"dark";
  document.documentElement.setAttribute("data-theme",t);
  themeToggle.textContent=t==="dark"?"🌙":"☀️";
}
themeToggle.addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme");
  const next=cur==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  themeToggle.textContent=next==="dark"?"🌙":"☀️";
  localStorage.setItem("cinelog-theme",next);
});

/* ════ USERS ════ */
async function loadUsers(){
  const snap=await usersCol.orderBy("name").get();
  userSelect.innerHTML='<option value="">— Select User —</option>';
  if(snap.empty){await seedDefaultUsers();return loadUsers();}
  snap.forEach(doc=>{
    const o=document.createElement("option");
    o.value=doc.id; o.textContent=doc.data().name;
    userSelect.appendChild(o);
  });
  const saved=localStorage.getItem("cinelog-userId");
  if(saved){userSelect.value=saved;if(userSelect.value)onUserChange(saved);}
}

async function seedDefaultUsers(){
  const b=db.batch();
  ["Siva","Vishnu","Geto"].forEach(n=>b.set(usersCol.doc(),{name:n}));
  await b.commit();
}

function onUserChange(uid){
  currentUserId=uid;
  currentUserName=userSelect.options[userSelect.selectedIndex]?.text||"";
  localStorage.setItem("cinelog-userId",uid);
  if(moviesListener)moviesListener();
  if(!uid){allMovies=[];renderCards();updateStats();return;}
  moviesListener=moviesCol
    .where("userId","==",uid).orderBy("createdAt","desc")
    .onSnapshot(snap=>{
      allMovies=snap.docs.map(d=>({id:d.id,...d.data()}));
      renderCards();updateStats();
    });
}

userSelect.addEventListener("change",()=>onUserChange(userSelect.value));
addUserBtn.addEventListener("click",()=>{addUserForm.classList.toggle("hidden");newUserNameEl.focus();});
cancelAddUser.addEventListener("click",()=>{addUserForm.classList.add("hidden");newUserNameEl.value="";});
confirmAddUser.addEventListener("click",async()=>{
  const name=newUserNameEl.value.trim();
  if(!name)return alert("Please enter a user name.");
  const ex=await usersCol.where("name","==",name).get();
  if(!ex.empty)return alert("User already exists.");
  const ref=await usersCol.add({name});
  addUserForm.classList.add("hidden");newUserNameEl.value="";
  await loadUsers();userSelect.value=ref.id;onUserChange(ref.id);
});
deleteUserBtn.addEventListener("click",async()=>{
  if(!currentUserId)return alert("Select a user first.");
  if(!confirm(`Delete "${currentUserName}" and ALL their movies?`))return;
  const ms=await moviesCol.where("userId","==",currentUserId).get();
  const b=db.batch();
  ms.forEach(d=>b.delete(d.ref));
  b.delete(usersCol.doc(currentUserId));
  await b.commit();
  currentUserId=null;allMovies=[];await loadUsers();renderCards();updateStats();
});

/* ════ CRUD ════ */
const addMovie   = d=>moviesCol.add({...d,userId:currentUserId,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
const updateMovie= (id,d)=>moviesCol.doc(id).update(d);
const deleteMovie= id=>moviesCol.doc(id).delete();
const toggleFav  = (id,cur)=>moviesCol.doc(id).update({favourite:!cur});

/* ════ MODAL ════ */
function openModal(movie=null){
  movieForm.reset();fRating.value=5;ratingDisplay.textContent="5";
  if(movie){
    modalTitle.textContent="Edit Movie"; editId.value=movie.id;
    fTitle.value=movie.title||""; fType.value=movie.type||"";
    fStatus.value=movie.status||""; fRating.value=movie.rating??5;
    ratingDisplay.textContent=movie.rating??5;
    fGenre.value=movie.genre||""; fPlatform.value=movie.platform||"";
    fEpisodes.value=movie.episodes||""; fRewatch.value=movie.rewatch||"";
    fPoster.value=movie.poster||""; fNotes.value=movie.notes||"";
    fFav.checked=movie.favourite||false;
  }else{modalTitle.textContent="Add Movie";editId.value="";}
  movieModal.classList.remove("hidden");
  document.body.style.overflow="hidden";fTitle.focus();
}
function closeModal(){movieModal.classList.add("hidden");document.body.style.overflow="";}

openAddModal.addEventListener("click",()=>{if(!currentUserId)return alert("Select a user first.");openModal();});
$("closeModal").addEventListener("click",closeModal);
$("cancelModal").addEventListener("click",closeModal);
movieModal.addEventListener("click",e=>{if(e.target===movieModal)closeModal();});
fRating.addEventListener("input",()=>{ratingDisplay.textContent=fRating.value;});

movieForm.addEventListener("submit",async e=>{
  e.preventDefault();
  const data={
    title:fTitle.value.trim(),type:fType.value,status:fStatus.value,
    rating:Number(fRating.value),genre:fGenre.value.trim(),
    platform:fPlatform.value.trim(),
    episodes:fEpisodes.value?Number(fEpisodes.value):null,
    rewatch:fRewatch.value?Number(fRewatch.value):0,
    poster:fPoster.value.trim(),notes:fNotes.value.trim(),favourite:fFav.checked
  };
  try{
    const id=editId.value;
    if(id)await updateMovie(id,data); else await addMovie(data);
    closeModal();
  }catch(err){console.error(err);alert("Error saving. Check console.");}
});

/* ════ RENDER ════ */
function getFiltered(){
  const q=searchInput.value.toLowerCase(),ft=filterType.value,fs=filterStatus.value;
  return allMovies.filter(m=>
    (!q||m.title.toLowerCase().includes(q))&&(!ft||m.type===ft)&&(!fs||m.status===fs));
}
const statusClass=s=>s==="Watched"?"status-watched":s==="Watching"?"status-watching":s==="Plan to Watch"?"status-plan":"";
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function renderCards(){
  movieGrid.innerHTML="";
  const movies=getFiltered();
  if(!movies.length){emptyState.classList.remove("hidden");return;}
  emptyState.classList.add("hidden");

  movies.forEach(m=>{
    const card=document.createElement("div");
    card.className=`movie-card${m.favourite?" is-fav":""}`;

    const posterHTML=m.poster
      ?`<img class="card-poster" src="${esc(m.poster)}" alt="${esc(m.title)}" loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
         <div class="card-poster-placeholder" style="display:none">🎬</div>`
      :`<div class="card-poster-placeholder">🎬</div>`;

    const meta=[];
    if(m.genre)meta.push(`🎭 ${esc(m.genre)}`);
    if(m.platform)meta.push(`📺 ${esc(m.platform)}`);
    if(m.episodes)meta.push(`📋 ${m.episodes} eps`);
    if(m.rewatch)meta.push(`🔁 ×${m.rewatch}`);

    card.innerHTML=`
      ${posterHTML}
      <div class="card-body">
        <div class="card-top">
          <span class="card-title">${esc(m.title)}</span>
          <button class="fav-btn" data-id="${m.id}" data-fav="${!!m.favourite}">${m.favourite?"❤️":"🤍"}</button>
        </div>
        <div class="card-tags">
          <span class="tag">${esc(m.type)}</span>
          <span class="tag ${statusClass(m.status)}">${esc(m.status)}</span>
        </div>
        <div class="card-rating">
          <div class="rating-bar"><div class="rating-fill" style="width:${m.rating*10}%"></div></div>
          <span class="rating-value">${m.rating}/10</span>
        </div>
        ${meta.length?`<div class="card-meta">${meta.map(l=>`<span>${l}</span>`).join("")}</div>`:""}
        ${m.notes?`<p class="card-notes">${esc(m.notes)}</p>`:""}
      </div>
      <div class="card-actions">
        <button class="btn btn-ghost edit-btn" data-id="${m.id}">✏️ Edit</button>
        <button class="btn btn-danger del-btn" data-id="${m.id}">🗑 Delete</button>
      </div>`;
    movieGrid.appendChild(card);
  });

  movieGrid.querySelectorAll(".edit-btn").forEach(b=>b.addEventListener("click",()=>{
    const mv=allMovies.find(m=>m.id===b.dataset.id);if(mv)openModal(mv);
  }));
  movieGrid.querySelectorAll(".del-btn").forEach(b=>b.addEventListener("click",async()=>{
    if(!confirm("Delete this movie?"))return;await deleteMovie(b.dataset.id);
  }));
  movieGrid.querySelectorAll(".fav-btn").forEach(b=>b.addEventListener("click",()=>toggleFav(b.dataset.id,b.dataset.fav==="true")));
}

/* ════ STATS ════ */
function updateStats(){
  statTotal.textContent=allMovies.length;
  statWatched.textContent=allMovies.filter(m=>m.status==="Watched").length;
  statWatching.textContent=allMovies.filter(m=>m.status==="Watching").length;
  statPlan.textContent=allMovies.filter(m=>m.status==="Plan to Watch").length;
  statFav.textContent=allMovies.filter(m=>m.favourite).length;
}

searchInput.addEventListener("input",renderCards);
filterType.addEventListener("change",renderCards);
filterStatus.addEventListener("change",renderCards);

/* ════ BOOT ════ */
(async()=>{initTheme();await loadUsers();updateStats();})();
</script>
</body>
</html>
